---
apiVersion: v1
kind: Service
metadata:
  namespace: permission-manager
  name: permission-manager
spec:
  selector:
    app: permission-manager
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 28824
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: permission-manager
  name: permission-manager
  labels:
    app: permission-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: permission-manager
  template:
    metadata:
      labels:
        app: permission-manager
    spec:
      serviceAccountName: permission-manager
      containers:
        - name: permission-manager
          image: h2372/permission-manager:v4
          ports:
            - containerPort: 4000
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - secretRef:
                name: permission-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: permission-manager
  namespace: permission-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: permission-manager
rules:
  # Allow discovery and checking of all resources to avoid escalation errors
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "bind", "escalate"]
  # Allow full management of RBAC resources
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # Allow full management of core resources
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  # Allow full management of certificates
  - apiGroups: ["certificates.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # Support all other common groups for templates and internal CRDs
  - apiGroups: ["networking.k8s.io", "apps", "batch", "autoscaling", "gateway.networking.k8s.io", "permissionmanager.user"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: permission-manager
roleRef:
  kind: ClusterRole
  name: permission-manager
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: permission-manager
    namespace: permission-manager
